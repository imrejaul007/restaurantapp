apiVersion: v2
name: restauranthub
description: A comprehensive B2B/B2C SaaS platform for restaurants
type: application
version: 1.0.0
appVersion: "1.0.0"
home: https://restauranthub.com
sources:
  - https://github.com/restauranthub/restauranthub
maintainers:
  - name: RestaurantHub Team
    email: devops@restauranthub.com
dependencies:
  - name: postgresql
    version: 12.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 17.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: prometheus
    version: 15.x.x
    repository: https://prometheus-community.github.io/helm-charts
    condition: monitoring.prometheus.enabled
  - name: grafana
    version: 6.x.x
    repository: https://grafana.github.io/helm-charts
    condition: monitoring.grafana.enabled