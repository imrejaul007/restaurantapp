version: '3.8'

services:
  # PostgreSQL for backup testing
  postgres-backup-test:
    image: postgres:15
    container_name: restauranthub-backup-postgres
    environment:
      POSTGRES_DB: restauranthub_backup_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_backup_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
      - ./backups:/backups
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=3
      -c max_replication_slots=3
      -c archive_mode=on
      -c archive_command='cp %p /backups/wal/%f'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backup service
  backup-service:
    build:
      context: .
      dockerfile: Dockerfile.backup
    container_name: restauranthub-backup-service
    depends_on:
      postgres-backup-test:
        condition: service_healthy
    environment:
      - DB_HOST=postgres-backup-test
      - DB_PORT=5432
      - DB_NAME=restauranthub_backup_test
      - DB_USER=postgres
      - DB_PASSWORD=password
      - BACKUP_SCHEDULE=0 2 * * *  # Daily at 2 AM
      - BACKUP_RETENTION_DAYS=30
      - S3_BUCKET=${S3_BACKUP_BUCKET:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - ./backups:/backups
      - ./scripts:/scripts
      - ./logs:/logs
    command: ["./scripts/backup-daemon.sh"]
    restart: unless-stopped

  # Monitoring service for backup status
  backup-monitor:
    image: prom/prometheus:latest
    container_name: restauranthub-backup-monitor
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'

  # Grafana for backup dashboards
  backup-dashboard:
    image: grafana/grafana:latest
    container_name: restauranthub-backup-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_backup_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - backup-monitor

  # MinIO for S3-compatible backup storage testing
  minio:
    image: minio/minio:latest
    container_name: restauranthub-backup-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    volumes:
      - minio_backup_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Backup validation service
  backup-validator:
    build:
      context: .
      dockerfile: Dockerfile.validator
    container_name: restauranthub-backup-validator
    depends_on:
      postgres-backup-test:
        condition: service_healthy
    environment:
      - DB_HOST=postgres-backup-test
      - DB_PORT=5432
      - DB_NAME=restauranthub_backup_test
      - DB_USER=postgres
      - DB_PASSWORD=password
      - VALIDATION_SCHEDULE=0 4 * * *  # Daily at 4 AM
    volumes:
      - ./backups:/backups
      - ./scripts:/scripts
      - ./logs:/logs
    command: ["./scripts/backup-validator.sh"]
    restart: unless-stopped

volumes:
  postgres_backup_data:
  grafana_backup_data:
  minio_backup_data:

networks:
  default:
    name: restauranthub-backup-network