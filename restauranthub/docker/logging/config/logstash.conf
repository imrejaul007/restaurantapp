input {
  # Beats input for Filebeat
  beats {
    port => 5044
  }

  # TCP input for application logs
  tcp {
    port => 5000
    codec => json_lines
  }

  # UDP input for syslog
  udp {
    port => 514
    codec => plain
  }

  # HTTP input for direct log submission
  http {
    port => 8080
    codec => json
  }

  # File input for direct log file reading
  file {
    path => "/logs/**/*.log"
    start_position => "beginning"
    codec => multiline {
      pattern => "^%{TIMESTAMP_ISO8601}"
      negate => true
      what => "previous"
    }
    tags => ["file-input"]
  }
}

filter {
  # Parse timestamp
  if [timestamp] {
    date {
      match => [ "timestamp", "ISO8601" ]
    }
  }

  # Parse application logs
  if [fields][logtype] == "application" {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:log_timestamp} \[%{LOGLEVEL:level}\] %{DATA:logger}: %{GREEDYDATA:log_message}"
      }
    }

    # Parse JSON logs from NestJS
    if [log_message] =~ /^\{.*\}$/ {
      json {
        source => "log_message"
        target => "parsed"
      }
    }
  }

  # Parse API access logs
  if [fields][logtype] == "access" {
    grok {
      match => {
        "message" => "%{COMBINEDAPACHELOG}"
      }
    }
  }

  # Parse error logs
  if [fields][logtype] == "error" {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:error_timestamp} \[%{LOGLEVEL:level}\] %{DATA:error_type}: %{GREEDYDATA:error_message}"
      }
    }

    # Extract stack traces
    if [error_message] =~ /at / {
      mutate {
        add_field => { "has_stacktrace" => "true" }
      }
    }
  }

  # Parse database logs
  if [fields][logtype] == "database" {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:db_timestamp} \[%{LOGLEVEL:level}\] %{DATA:query_type}: %{GREEDYDATA:query}"
      }
    }

    # Extract slow query information
    if [query_type] == "SLOW_QUERY" {
      mutate {
        add_field => { "slow_query" => "true" }
      }
    }
  }

  # Parse backup logs
  if [fields][logtype] == "backup" {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:backup_timestamp} \[%{DATA:backup_status}\] %{GREEDYDATA:backup_message}"
      }
    }
  }

  # Parse security logs
  if [fields][logtype] == "security" {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:security_timestamp} \[%{DATA:security_event}\] %{DATA:user_id}? %{GREEDYDATA:security_details}"
      }
    }
  }

  # Parse performance logs
  if [fields][logtype] == "performance" {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:perf_timestamp} \[PERF\] %{DATA:operation}: %{NUMBER:duration:float}ms %{GREEDYDATA:perf_details}"
      }
    }
  }

  # Add environment information
  mutate {
    add_field => {
      "environment" => "${ENVIRONMENT:development}"
      "service" => "restauranthub"
      "version" => "${APP_VERSION:1.0.0}"
    }
  }

  # Parse container logs
  if [container] {
    mutate {
      add_field => { "service_name" => "%{[container][name]}" }
    }
  }

  # Geoip for IP addresses
  if [clientip] {
    geoip {
      source => "clientip"
      target => "geoip"
    }
  }

  # Remove empty fields
  prune {
    blacklist_names => [ "^$", "^\s*$" ]
  }

  # Add tags for easier filtering
  if [level] == "ERROR" {
    mutate {
      add_tag => [ "error" ]
    }
  }

  if [level] == "WARN" {
    mutate {
      add_tag => [ "warning" ]
    }
  }

  if [response] and [response] >= 400 {
    mutate {
      add_tag => [ "http_error" ]
    }
  }

  if [response] and [response] >= 500 {
    mutate {
      add_tag => [ "server_error" ]
    }
  }

  # Calculate response time categories
  if [response_time] {
    if [response_time] > 5000 {
      mutate {
        add_tag => [ "very_slow" ]
      }
    } else if [response_time] > 2000 {
      mutate {
        add_tag => [ "slow" ]
      }
    } else if [response_time] > 1000 {
      mutate {
        add_tag => [ "medium" ]
      }
    } else {
      mutate {
        add_tag => [ "fast" ]
      }
    }
  }
}

output {
  # Output to Elasticsearch with index patterns
  elasticsearch {
    hosts => ["elasticsearch:9200"]

    # Index pattern based on log type and date
    index => "restauranthub-%{[fields][logtype]:general}-%{+YYYY.MM.dd}"

    # Document type
    document_type => "_doc"

    # Template management
    manage_template => true
    template_name => "restauranthub"
    template_pattern => "restauranthub-*"
    template => "/usr/share/logstash/templates/restauranthub-template.json"
    template_overwrite => true
  }

  # Output to file for debugging
  if [@metadata][debug] {
    file {
      path => "/logs/logstash-debug.log"
      codec => rubydebug
    }
  }

  # Output to stdout for development
  if [environment] == "development" {
    stdout {
      codec => rubydebug {
        metadata => true
      }
    }
  }
}