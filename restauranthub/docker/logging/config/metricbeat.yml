metricbeat.config:
  modules:
    path: ${path.config}/modules.d/*.yml
    reload.enabled: false

# System module
metricbeat.modules:
# System metrics
- module: system
  metricsets:
    - cpu
    - load
    - memory
    - network
    - process
    - process_summary
    - socket_summary
    - filesystem
    - fsstat
  enabled: true
  period: 10s
  processes: ['.*']

  # CPU metrics
  cpu.metrics: ["percentages", "normalized_percentages"]
  core.metrics: ["percentages"]

# Docker module
- module: docker
  metricsets:
    - container
    - cpu
    - diskio
    - healthcheck
    - info
    - image
    - memory
    - network
  hosts: ["unix:///var/run/docker.sock"]
  period: 10s
  enabled: true

# HTTP module for RestaurantHub services
- module: http
  metricsets: ["json"]
  period: 30s
  hosts: ["http://host.docker.internal:3008/api/v1/health"]
  namespace: "restauranthub.api"
  path: "/"
  enabled: true

- module: http
  metricsets: ["json"]
  period: 30s
  hosts: ["http://host.docker.internal:3009/api/health"]
  namespace: "restauranthub.web"
  path: "/"
  enabled: true

# PostgreSQL module
- module: postgresql
  metricsets:
    - database
    - bgwriter
    - activity
  period: 10s
  hosts: ["postgres://postgres:password@host.docker.internal:5432/restauranthub?sslmode=disable"]
  enabled: false  # Enable when PostgreSQL is available

# Redis module
- module: redis
  metricsets:
    - info
    - keyspace
  period: 10s
  hosts: ["host.docker.internal:6379"]
  enabled: false  # Enable when Redis is available

# Nginx module (if using Nginx)
- module: nginx
  metricsets: ["stubstatus"]
  period: 10s
  hosts: ["http://host.docker.internal:8080/nginx_status"]
  enabled: false

# Kubernetes module (if running in K8s)
- module: kubernetes
  metricsets:
    - node
    - system
    - pod
    - container
    - volume
  period: 10s
  host: ${NODE_NAME}
  hosts: ["https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}"]
  enabled: false

# Prometheus module
- module: prometheus
  metricsets: ["collector"]
  period: 10s
  hosts: ["host.docker.internal:9090"]
  metrics_path: /metrics
  enabled: false

# Output configuration
output.elasticsearch:
  hosts: ['elasticsearch:9200']
  protocol: "http"
  username: ""
  password: ""

  # Index settings
  index: "metricbeat-%{[agent.version]}-%{+yyyy.MM.dd}"

  # Template settings
  template.name: "metricbeat"
  template.pattern: "metricbeat-*"
  template.settings:
    index.number_of_shards: 1
    index.number_of_replicas: 0
    index.refresh_interval: 5s

# Processors
processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_cloud_metadata: ~
  - add_docker_metadata: ~
  - add_kubernetes_metadata: ~

  # Add custom fields
  - add_fields:
      target: ''
      fields:
        service: restauranthub
        environment: ${ENVIRONMENT:development}

# Logging
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/metricbeat
  name: metricbeat
  keepfiles: 7
  permissions: 0644

# Monitoring
monitoring.enabled: true
monitoring.elasticsearch:
  hosts: ["elasticsearch:9200"]

# Setup
setup.template.settings:
  index.number_of_shards: 1
  index.number_of_replicas: 0

setup.dashboards.enabled: true

setup.kibana:
  host: "kibana:5601"

# ILM Policy
setup.ilm.enabled: true
setup.ilm.rollover_alias: "metricbeat"
setup.ilm.pattern: "{now/d}-000001"