# Curator actions for RestaurantHub index lifecycle management

actions:
  1:
    action: delete_indices
    description: "Delete indices older than 90 days"
    options:
      ignore_empty_list: True
      timeout_override:
      continue_if_exception: False
      disable_action: False
    filters:
    - filtertype: pattern
      kind: prefix
      value: restauranthub-
      exclude:
    - filtertype: age
      source: name
      direction: older
      timestring: '%Y.%m.%d'
      unit: days
      unit_count: 90
      exclude:

  2:
    action: delete_indices
    description: "Delete APM indices older than 30 days"
    options:
      ignore_empty_list: True
      timeout_override:
      continue_if_exception: False
      disable_action: False
    filters:
    - filtertype: pattern
      kind: prefix
      value: apm-
      exclude:
    - filtertype: age
      source: name
      direction: older
      timestring: '%Y.%m.%d'
      unit: days
      unit_count: 30
      exclude:

  3:
    action: delete_indices
    description: "Delete metricbeat indices older than 60 days"
    options:
      ignore_empty_list: True
      timeout_override:
      continue_if_exception: False
      disable_action: False
    filters:
    - filtertype: pattern
      kind: prefix
      value: metricbeat-
      exclude:
    - filtertype: age
      source: name
      direction: older
      timestring: '%Y.%m.%d'
      unit: days
      unit_count: 60
      exclude:

  4:
    action: delete_indices
    description: "Delete filebeat indices older than 60 days"
    options:
      ignore_empty_list: True
      timeout_override:
      continue_if_exception: False
      disable_action: False
    filters:
    - filtertype: pattern
      kind: prefix
      value: filebeat-
      exclude:
    - filtertype: age
      source: name
      direction: older
      timestring: '%Y.%m.%d'
      unit: days
      unit_count: 60
      exclude:

  5:
    action: close
    description: "Close indices older than 30 days"
    options:
      ignore_empty_list: True
      timeout_override:
      continue_if_exception: False
      disable_action: False
    filters:
    - filtertype: pattern
      kind: prefix
      value: restauranthub-
      exclude:
    - filtertype: age
      source: name
      direction: older
      timestring: '%Y.%m.%d'
      unit: days
      unit_count: 30
      exclude:

  6:
    action: forcemerge
    description: "Forcemerge indices older than 7 days"
    options:
      max_num_segments: 1
      delay: 120
      timeout_override:
      continue_if_exception: False
      disable_action: False
    filters:
    - filtertype: pattern
      kind: prefix
      value: restauranthub-
      exclude:
    - filtertype: age
      source: name
      direction: older
      timestring: '%Y.%m.%d'
      unit: days
      unit_count: 7
      exclude:
    - filtertype: closed
      exclude: True

  7:
    action: allocation
    description: "Move indices older than 14 days to warm nodes"
    options:
      key: node_type
      value: warm
      allocation_type: include
      wait_for_completion: false
      timeout_override:
      continue_if_exception: False
      disable_action: True  # Disabled unless warm nodes are available
    filters:
    - filtertype: pattern
      kind: prefix
      value: restauranthub-
      exclude:
    - filtertype: age
      source: name
      direction: older
      timestring: '%Y.%m.%d'
      unit: days
      unit_count: 14
      exclude:

  8:
    action: snapshot
    description: "Snapshot indices older than 1 day"
    options:
      repository: backup-repository
      name: restauranthub-snapshot-%Y%m%d%H%M%S
      ignore_unavailable: false
      include_global_state: true
      partial: false
      wait_for_completion: true
      skip_repo_fs_check: false
      timeout_override:
      continue_if_exception: False
      disable_action: True  # Disabled unless repository is configured
    filters:
    - filtertype: pattern
      kind: prefix
      value: restauranthub-
      exclude:
    - filtertype: age
      source: name
      direction: older
      timestring: '%Y.%m.%d'
      unit: days
      unit_count: 1
      exclude: