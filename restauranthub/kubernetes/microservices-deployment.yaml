---
# Horizontal Pod Autoscaler for Order Service
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-service-hpa
  namespace: restauranthub
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# Horizontal Pod Autoscaler for API Gateway
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: restauranthub
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: restauranthub
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  MESH_ENABLE_TRACING: "true"
  MESH_ENABLE_METRICS: "true"
  MESH_ENABLE_SECURITY: "true"
  MESH_ENABLE_LB: "true"
  TRACING_SAMPLING_RATE: "0.1"

---
# Secrets
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: restauranthub
type: Opaque
data:
  password: cGFzc3dvcmQ= # base64 encoded "password"

---
apiVersion: v1
kind: Secret
metadata:
  name: database-secret
  namespace: restauranthub
type: Opaque
data:
  url: cG9zdGdyZXNxbDovL3Bvc3RncmVzOnBhc3N3b3JkQHBvc3RncmVzOjU0MzIvcmVzdGF1cmFudGh1Yg== # base64 encoded connection string

---
# Persistent Volume Claim for PostgreSQL
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: restauranthub
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
# Network Policies
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-communication
  namespace: restauranthub
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: restauranthub

---
# Service Monitor for Prometheus
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: restauranthub-services
  namespace: restauranthub
  labels:
    app: restauranthub
spec:
  selector:
    matchLabels:
      monitoring: enabled
  endpoints:
  - port: http
    path: /metrics
    interval: 30s