version: '3.8'

# ========================================================================================
# PRODUCTION DOCKER COMPOSE - ENHANCED CONFIGURATION
# ========================================================================================
# This configuration provides:
# - High availability with load balancing
# - Comprehensive monitoring and logging
# - Enhanced security measures
# - Auto-scaling capabilities
# - Backup and recovery services
# ========================================================================================

services:
  # ========================================================================================
  # API SERVICES - LOAD BALANCED
  # ========================================================================================

  api-primary:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runner
      cache_from:
        - ghcr.io/restauranthub/api:latest
    image: ghcr.io/restauranthub/api:latest
    container_name: restauranthub-api-primary
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - INSTANCE_ID=api-primary
      - CLUSTER_NODE=primary
      - API_PORT=3000
      - PROMETHEUS_ENABLED=true
      - HEALTH_CHECK_ENABLED=true
    env_file:
      - .env.production.enhanced
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-primary:
        condition: service_healthy
    networks:
      - restauranthub-backend
      - restauranthub-monitoring
    volumes:
      - api-logs:/app/logs
      - uploads:/app/uploads
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api-secondary:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runner
    image: ghcr.io/restauranthub/api:latest
    container_name: restauranthub-api-secondary
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - INSTANCE_ID=api-secondary
      - CLUSTER_NODE=secondary
      - API_PORT=3000
    env_file:
      - .env.production.enhanced
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-primary:
        condition: service_healthy
    networks:
      - restauranthub-backend
      - restauranthub-monitoring
    volumes:
      - api-logs:/app/logs
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"

  # ========================================================================================
  # WEB FRONTEND - LOAD BALANCED
  # ========================================================================================

  web-primary:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
    image: ghcr.io/restauranthub/web:latest
    container_name: restauranthub-web-primary
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - INSTANCE_ID=web-primary
    env_file:
      - .env.production.enhanced
    depends_on:
      - api-primary
    networks:
      - restauranthub-frontend
      - restauranthub-monitoring
    volumes:
      - web-static:/app/.next/static
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"

  web-secondary:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
    image: ghcr.io/restauranthub/web:latest
    container_name: restauranthub-web-secondary
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=production
      - INSTANCE_ID=web-secondary
    env_file:
      - .env.production.enhanced
    depends_on:
      - api-primary
    networks:
      - restauranthub-frontend
      - restauranthub-monitoring
    volumes:
      - web-static:/app/.next/static
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"

  # ========================================================================================
  # DATABASE CLUSTER - HIGH AVAILABILITY
  # ========================================================================================

  postgres-primary:
    image: postgres:15-alpine
    container_name: restauranthub-postgres-primary
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-restauranthub_prod}
      POSTGRES_USER: ${POSTGRES_USER:-restauranthub_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_REPLICATION_MODE: master
      POSTGRES_REPLICATION_USER: replicator
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./deploy/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./deploy/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./deploy/postgres-init:/docker-entrypoint-initdb.d
    networks:
      - restauranthub-backend
      - restauranthub-monitoring
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-restauranthub_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres-replica:
    image: postgres:15-alpine
    container_name: restauranthub-postgres-replica
    restart: unless-stopped
    environment:
      POSTGRES_MASTER_SERVICE: postgres-primary
      POSTGRES_REPLICATION_MODE: slave
      POSTGRES_REPLICATION_USER: replicator
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
      POSTGRES_MASTER_PORT_NUMBER: 5432
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    networks:
      - restauranthub-backend
    ports:
      - "5433:5432"
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U replicator"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ========================================================================================
  # REDIS CLUSTER - HIGH AVAILABILITY CACHING
  # ========================================================================================

  redis-primary:
    image: redis:7-alpine
    container_name: restauranthub-redis-primary
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_primary_data:/data
      - ./deploy/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - restauranthub-backend
      - restauranthub-monitoring
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  redis-replica:
    image: redis:7-alpine
    container_name: restauranthub-redis-replica
    restart: unless-stopped
    command: >
      redis-server
      --replicaof redis-primary 6379
      --masterauth ${REDIS_PASSWORD}
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
    volumes:
      - redis_replica_data:/data
    networks:
      - restauranthub-backend
    ports:
      - "6380:6379"
    depends_on:
      redis-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ========================================================================================
  # LOAD BALANCER AND REVERSE PROXY
  # ========================================================================================

  nginx-lb:
    image: nginx:alpine
    container_name: restauranthub-nginx-lb
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx-production.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - web_static:/var/www/html/static:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api-primary
      - api-secondary
      - web-primary
      - web-secondary
    networks:
      - restauranthub-frontend
      - restauranthub-backend
      - restauranthub-monitoring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # ========================================================================================
  # MONITORING STACK
  # ========================================================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: restauranthub-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus-production.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - restauranthub-monitoring
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  grafana:
    image: grafana/grafana:latest
    container_name: restauranthub-grafana
    restart: unless-stopped
    ports:
      - "3004:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - restauranthub-monitoring
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  alertmanager:
    image: prom/alertmanager:latest
    container_name: restauranthub-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    networks:
      - restauranthub-monitoring
    depends_on:
      - prometheus

  # ========================================================================================
  # LOGGING STACK
  # ========================================================================================

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: restauranthub-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - restauranthub-monitoring
    ports:
      - "9200:9200"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.0
    container_name: restauranthub-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    volumes:
      - kibana_data:/usr/share/kibana/data
    networks:
      - restauranthub-monitoring
    depends_on:
      - elasticsearch

  logstash:
    image: docker.elastic.co/logstash/logstash:8.10.0
    container_name: restauranthub-logstash
    restart: unless-stopped
    volumes:
      - ./monitoring/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./monitoring/logstash/config:/usr/share/logstash/config:ro
      - api-logs:/logs/api:ro
      - nginx_logs:/logs/nginx:ro
    networks:
      - restauranthub-monitoring
    depends_on:
      - elasticsearch
    ports:
      - "5044:5044"

  # ========================================================================================
  # BACKUP AND MAINTENANCE SERVICES
  # ========================================================================================

  backup-service:
    build:
      context: ./docker/backup-restore
      dockerfile: Dockerfile.backup
    container_name: restauranthub-backup
    restart: unless-stopped
    environment:
      - BACKUP_SCHEDULE=0 2 * * *
      - POSTGRES_HOST=postgres-primary
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BACKUP_BUCKET=${BACKUP_S3_BUCKET}
    volumes:
      - backup_data:/backups
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - restauranthub-backend
    depends_on:
      - postgres-primary

  # ========================================================================================
  # SECURITY SERVICES
  # ========================================================================================

  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: restauranthub-fail2ban
    restart: unless-stopped
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./deploy/fail2ban:/data
      - nginx_logs:/var/log/nginx:ro
    environment:
      - TZ=UTC
      - F2B_LOG_LEVEL=INFO

# ========================================================================================
# VOLUMES CONFIGURATION
# ========================================================================================

volumes:
  # Database volumes
  postgres_primary_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/postgres/primary
  postgres_replica_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/postgres/replica

  # Redis volumes
  redis_primary_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/redis/primary
  redis_replica_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/redis/replica

  # Application volumes
  api-logs:
    driver: local
  uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/uploads
  web_static:
    driver: local

  # Monitoring volumes
  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/prometheus
  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/grafana
  alertmanager_data:
    driver: local

  # Logging volumes
  elasticsearch_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/elasticsearch
  kibana_data:
    driver: local
  nginx_logs:
    driver: local

  # Backup volumes
  backup_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/backups

# ========================================================================================
# NETWORKS CONFIGURATION
# ========================================================================================

networks:
  restauranthub-frontend:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: rh-frontend
    ipam:
      config:
        - subnet: 172.20.1.0/24

  restauranthub-backend:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: rh-backend
    ipam:
      config:
        - subnet: 172.20.2.0/24

  restauranthub-monitoring:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: rh-monitoring
    ipam:
      config:
        - subnet: 172.20.3.0/24