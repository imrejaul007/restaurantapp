apiVersion: v1
kind: ServiceAccount
metadata:
  name: restauranthub-api
  namespace: restauranthub
  labels:
    app: restauranthub-api
automountServiceAccountToken: true

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: restauranthub-web
  namespace: restauranthub
  labels:
    app: restauranthub-web
automountServiceAccountToken: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: restauranthub-backup
  namespace: restauranthub
  labels:
    app: backup-service
automountServiceAccountToken: true

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: restauranthub-monitoring
  namespace: restauranthub-monitoring
  labels:
    app: monitoring
automountServiceAccountToken: true

---
# Role for API service - limited permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: restauranthub
  name: restauranthub-api-role
rules:
# Allow reading configmaps and secrets
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]
# Allow reading pods for health checks
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
  resourceNames: ["self"]
# Allow reading services for service discovery
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]

---
# Role for backup service
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: restauranthub
  name: backup-service-role
rules:
# Allow accessing pods for database backup
- apiGroups: [""]
  resources: ["pods", "pods/exec"]
  verbs: ["get", "list", "create"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["statefulsets"]
  verbs: ["get", "list"]

---
# ClusterRole for monitoring
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: restauranthub-monitoring-role
rules:
# Allow reading metrics from all namespaces
- apiGroups: [""]
  resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["extensions"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch"]
- nonResourceURLs: ["/metrics"]
  verbs: ["get"]

---
# RoleBinding for API service
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: restauranthub-api-rolebinding
  namespace: restauranthub
subjects:
- kind: ServiceAccount
  name: restauranthub-api
  namespace: restauranthub
roleRef:
  kind: Role
  name: restauranthub-api-role
  apiGroup: rbac.authorization.k8s.io

---
# RoleBinding for backup service
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backup-service-rolebinding
  namespace: restauranthub
subjects:
- kind: ServiceAccount
  name: restauranthub-backup
  namespace: restauranthub
roleRef:
  kind: Role
  name: backup-service-role
  apiGroup: rbac.authorization.k8s.io

---
# ClusterRoleBinding for monitoring
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: restauranthub-monitoring-rolebinding
subjects:
- kind: ServiceAccount
  name: restauranthub-monitoring
  namespace: restauranthub-monitoring
roleRef:
  kind: ClusterRole
  name: restauranthub-monitoring-role
  apiGroup: rbac.authorization.k8s.io

---
# Pod Security Policy
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: restauranthub-psp
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
    - ALL
  volumes:
    - 'configMap'
    - 'emptyDir'
    - 'projected'
    - 'secret'
    - 'downwardAPI'
    - 'persistentVolumeClaim'
  runAsUser:
    rule: 'MustRunAsNonRoot'
  runAsGroup:
    rule: 'MustRunAs'
    ranges:
      - min: 1000
        max: 65535
  seLinux:
    rule: 'RunAsAny'
  fsGroup:
    rule: 'MustRunAs'
    ranges:
      - min: 1000
        max: 65535
  readOnlyRootFilesystem: false

---
# PSP Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: psp-user
  namespace: restauranthub
rules:
- apiGroups: ['policy']
  resources: ['podsecuritypolicies']
  verbs: ['use']
  resourceNames:
  - restauranthub-psp

---
# PSP RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: psp-users
  namespace: restauranthub
roleRef:
  kind: Role
  name: psp-user
  apiGroup: rbac.authorization.k8s.io
subjects:
- kind: ServiceAccount
  name: restauranthub-api
  namespace: restauranthub
- kind: ServiceAccount
  name: restauranthub-web
  namespace: restauranthub
- kind: ServiceAccount
  name: restauranthub-backup
  namespace: restauranthub