modules:
  # HTTP 2xx probe for general health checks
  http_2xx:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 201, 202]
      method: GET
      follow_redirects: true
      preferred_ip_protocol: "ip4"
      fail_if_ssl: false
      fail_if_not_ssl: false

  # HTTP probe with custom headers for API endpoints
  http_api:
    prober: http
    timeout: 15s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 201, 202, 401, 403]
      method: GET
      follow_redirects: false
      preferred_ip_protocol: "ip4"
      headers:
        User-Agent: "RestaurantHub-Monitoring/1.0"
        Accept: "application/json"
      fail_if_ssl: false
      fail_if_not_ssl: false

  # HTTP probe for authenticated endpoints
  http_auth:
    prober: http
    timeout: 20s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 201, 202, 401]
      method: POST
      headers:
        Content-Type: "application/json"
        User-Agent: "RestaurantHub-Monitoring/1.0"
      body: |
        {
          "username": "healthcheck@restauranthub.com",
          "password": "healthcheck123"
        }
      follow_redirects: false
      preferred_ip_protocol: "ip4"

  # HTTP probe with response content validation
  http_content:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200]
      method: GET
      follow_redirects: true
      preferred_ip_protocol: "ip4"
      fail_if_body_not_matches_regexp:
        - ".*RestaurantHub.*"
        - ".*healthy.*"
      fail_if_header_not_matches_regexp:
        Content-Type:
          - "application/json.*"

  # HTTPS probe with SSL certificate validation
  https_ssl:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 201, 202]
      method: GET
      follow_redirects: true
      preferred_ip_protocol: "ip4"
      fail_if_ssl: false
      fail_if_not_ssl: true
      tls_config:
        insecure_skip_verify: false
        ca_file: "/etc/ssl/certs/ca-certificates.crt"

  # TCP probe for database connections
  tcp_connect:
    prober: tcp
    timeout: 5s
    tcp:
      preferred_ip_protocol: "ip4"
      source_ip_address: ""

  # TCP probe with query for PostgreSQL
  tcp_postgres:
    prober: tcp
    timeout: 10s
    tcp:
      preferred_ip_protocol: "ip4"
      query_response:
        - expect: "^\\x00"
        - send: "\\x00\\x00\\x00\\x17\\x00\\x03\\x00\\x00user\\x00test\\x00\\x00"

  # TCP probe for Redis
  tcp_redis:
    prober: tcp
    timeout: 5s
    tcp:
      preferred_ip_protocol: "ip4"
      query_response:
        - send: "PING\r\n"
        - expect: "PONG"

  # ICMP probe for network connectivity
  icmp:
    prober: icmp
    timeout: 5s
    icmp:
      preferred_ip_protocol: "ip4"
      source_ip_address: ""

  # DNS probe for domain resolution
  dns_query:
    prober: dns
    timeout: 5s
    dns:
      preferred_ip_protocol: "ip4"
      query_name: "restauranthub.com"
      query_type: "A"
      valid_rcodes:
        - NOERROR
      validate_answer_rrs:
        fail_if_matches_regexp:
          - ".*127\\.0\\.0\\.1.*"
        fail_if_not_matches_regexp:
          - ".*"

  # DNS probe for MX records
  dns_mx:
    prober: dns
    timeout: 5s
    dns:
      preferred_ip_protocol: "ip4"
      query_type: "MX"
      valid_rcodes:
        - NOERROR

  # HTTP probe for performance testing
  http_performance:
    prober: http
    timeout: 30s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200]
      method: GET
      follow_redirects: true
      preferred_ip_protocol: "ip4"
      fail_if_ssl: false
      fail_if_not_ssl: false

  # HTTP probe for load balancer health
  http_load_balancer:
    prober: http
    timeout: 5s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 503]
      method: GET
      follow_redirects: false
      preferred_ip_protocol: "ip4"
      headers:
        User-Agent: "RestaurantHub-LoadBalancer-Check/1.0"

  # GraphQL probe for API endpoints
  graphql_query:
    prober: http
    timeout: 15s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200]
      method: POST
      headers:
        Content-Type: "application/json"
        User-Agent: "RestaurantHub-GraphQL-Monitor/1.0"
      body: |
        {
          "query": "{ health { status timestamp version } }"
        }
      follow_redirects: false
      preferred_ip_protocol: "ip4"
      fail_if_body_not_matches_regexp:
        - ".*\"status\"\\s*:\\s*\"healthy\".*"

  # WebSocket probe for real-time features
  websocket:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1"]
      valid_status_codes: [101]
      method: GET
      headers:
        Connection: "Upgrade"
        Upgrade: "websocket"
        Sec-WebSocket-Key: "dGhlIHNhbXBsZSBub25jZQ=="
        Sec-WebSocket-Version: "13"
      follow_redirects: false
      preferred_ip_protocol: "ip4"

  # File download probe for static assets
  file_download:
    prober: http
    timeout: 30s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200]
      method: GET
      follow_redirects: true
      preferred_ip_protocol: "ip4"
      body_size_limit: 10485760  # 10MB limit
      fail_if_header_not_matches_regexp:
        Content-Type:
          - "(image|application|text)/.*"

  # CDN health check
  cdn_check:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 304]
      method: GET
      follow_redirects: true
      preferred_ip_protocol: "ip4"
      headers:
        Cache-Control: "no-cache"
        User-Agent: "RestaurantHub-CDN-Monitor/1.0"

  # API rate limiting check
  rate_limit_check:
    prober: http
    timeout: 5s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 429]
      method: GET
      follow_redirects: false
      preferred_ip_protocol: "ip4"
      headers:
        User-Agent: "RestaurantHub-RateLimit-Check/1.0"

  # Third-party service integration checks
  payment_gateway:
    prober: http
    timeout: 15s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 401, 403]
      method: GET
      follow_redirects: true
      preferred_ip_protocol: "ip4"
      headers:
        User-Agent: "RestaurantHub-Payment-Monitor/1.0"
      fail_if_not_ssl: true

  # Email service check
  smtp_check:
    prober: tcp
    timeout: 10s
    tcp:
      preferred_ip_protocol: "ip4"
      query_response:
        - expect: "^220.*"
        - send: "EHLO monitoring.restauranthub.com\r\n"
        - expect: "^250.*"
        - send: "QUIT\r\n"