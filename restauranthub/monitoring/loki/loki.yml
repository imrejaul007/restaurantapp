auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

# Query configuration
query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

# Schema configuration
schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

# Storage configuration
storage_config:
  boltdb_shipper:
    active_index_directory: /loki/boltdb-shipper-active
    cache_location: /loki/boltdb-shipper-cache
    cache_ttl: 24h
    shared_store: filesystem
  filesystem:
    directory: /loki/chunks

# Limits configuration for RestaurantHub workload
limits_config:
  enforce_metric_name: false
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_cache_freshness_per_query: 10m
  split_queries_by_interval: 15m

  # Ingestion limits
  ingestion_rate_mb: 4
  ingestion_burst_size_mb: 6
  max_line_size: 256000
  max_streams_per_user: 10000
  max_global_streams_per_user: 5000

  # Query limits
  max_entries_limit_per_query: 5000
  max_chunks_per_query: 2000000
  max_query_series: 500
  max_query_parallelism: 32
  max_concurrent_tail_requests: 10

  # Retention configuration
  retention_period: 720h  # 30 days

# Table manager configuration
table_manager:
  retention_deletes_enabled: true
  retention_period: 720h

# Analytics configuration
analytics:
  reporting_enabled: false

# Ruler configuration for alerting
ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules
  alertmanager_url: http://alertmanager:9093
  ring:
    kvstore:
      store: inmemory
  enable_api: true

# Compactor configuration
compactor:
  working_directory: /loki/compactor
  shared_store: filesystem

# Index gateway (for better query performance)
index_gateway:
  mode: ring

# Frontend configuration
frontend:
  max_outstanding_per_tenant: 256
  compress_responses: true
  log_queries_longer_than: 5s

# Query frontend configuration
query_scheduler:
  max_outstanding_requests_per_tenant: 256

# Member list configuration for clustering
memberlist:
  abort_if_cluster_join_fails: false
  bind_port: 7946
  join_members:
    - loki:7946