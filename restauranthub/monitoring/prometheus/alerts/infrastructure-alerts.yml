# Infrastructure Alerts for RestaurantHub
groups:
  - name: infrastructure.rules
    rules:
      # System resource alerts
      - alert: HighSystemMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
          service: infrastructure
          team: devops
        annotations:
          summary: "High system memory usage"
          description: "System memory usage is {{ $value }}% on {{ $labels.instance }}"
          runbook_url: "https://docs.restauranthub.com/runbooks/high-system-memory"

      - alert: CriticalSystemMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 95
        for: 2m
        labels:
          severity: critical
          service: infrastructure
          team: devops
        annotations:
          summary: "Critical system memory usage"
          description: "System memory usage is {{ $value }}% on {{ $labels.instance }}"
          runbook_url: "https://docs.restauranthub.com/runbooks/critical-system-memory"

      - alert: HighSystemCPUUsage
        expr: 100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
          service: infrastructure
          team: devops
        annotations:
          summary: "High system CPU usage"
          description: "System CPU usage is {{ $value }}% on {{ $labels.instance }}"
          runbook_url: "https://docs.restauranthub.com/runbooks/high-system-cpu"

      - alert: HighDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"})) * 100 > 85
        for: 5m
        labels:
          severity: warning
          service: infrastructure
          team: devops
        annotations:
          summary: "High disk usage"
          description: "Disk usage is {{ $value }}% on {{ $labels.instance }} ({{ $labels.mountpoint }})"
          runbook_url: "https://docs.restauranthub.com/runbooks/high-disk-usage"

      - alert: CriticalDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"})) * 100 > 95
        for: 2m
        labels:
          severity: critical
          service: infrastructure
          team: devops
        annotations:
          summary: "Critical disk usage"
          description: "Disk usage is {{ $value }}% on {{ $labels.instance }} ({{ $labels.mountpoint }})"
          runbook_url: "https://docs.restauranthub.com/runbooks/critical-disk-usage"

      # Database alerts
      - alert: PostgreSQLDown
        expr: up{job="postgresql"} == 0
        for: 1m
        labels:
          severity: critical
          service: database
          team: backend
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL service is not responding"
          runbook_url: "https://docs.restauranthub.com/runbooks/postgresql-down"

      - alert: PostgreSQLTooManyConnections
        expr: sum(pg_stat_activity_count) by (instance) > 80
        for: 5m
        labels:
          severity: warning
          service: database
          team: backend
        annotations:
          summary: "PostgreSQL has too many connections"
          description: "PostgreSQL has {{ $value }} connections, which is approaching the limit"
          runbook_url: "https://docs.restauranthub.com/runbooks/postgresql-connections"

      - alert: PostgreSQLSlowQueries
        expr: pg_stat_activity_max_tx_duration > 300
        for: 5m
        labels:
          severity: warning
          service: database
          team: backend
        annotations:
          summary: "PostgreSQL has slow queries"
          description: "PostgreSQL has queries running for more than 5 minutes"
          runbook_url: "https://docs.restauranthub.com/runbooks/postgresql-slow-queries"

      - alert: PostgreSQLHighReplicationLag
        expr: pg_replication_lag > 100
        for: 5m
        labels:
          severity: warning
          service: database
          team: backend
        annotations:
          summary: "PostgreSQL replication lag is high"
          description: "PostgreSQL replication lag is {{ $value }} seconds"
          runbook_url: "https://docs.restauranthub.com/runbooks/postgresql-replication-lag"

      # Redis alerts
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
          service: cache
          team: backend
        annotations:
          summary: "Redis is down"
          description: "Redis service is not responding"
          runbook_url: "https://docs.restauranthub.com/runbooks/redis-down"

      - alert: RedisHighMemoryUsage
        expr: (redis_memory_used_bytes / redis_memory_max_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
          service: cache
          team: backend
        annotations:
          summary: "Redis memory usage is high"
          description: "Redis memory usage is {{ $value }}%"
          runbook_url: "https://docs.restauranthub.com/runbooks/redis-high-memory"

      - alert: RedisConnectionsHigh
        expr: redis_connected_clients > 100
        for: 5m
        labels:
          severity: warning
          service: cache
          team: backend
        annotations:
          summary: "Redis has high number of connections"
          description: "Redis has {{ $value }} connections"
          runbook_url: "https://docs.restauranthub.com/runbooks/redis-connections"

      - alert: RedisCacheMissRateHigh
        expr: (redis_keyspace_misses_total / (redis_keyspace_hits_total + redis_keyspace_misses_total)) * 100 > 50
        for: 10m
        labels:
          severity: warning
          service: cache
          team: backend
        annotations:
          summary: "Redis cache miss rate is high"
          description: "Redis cache miss rate is {{ $value }}%"
          runbook_url: "https://docs.restauranthub.com/runbooks/redis-cache-miss"

      # Load balancer and reverse proxy alerts
      - alert: NginxDown
        expr: up{job="nginx"} == 0
        for: 1m
        labels:
          severity: critical
          service: loadbalancer
          team: devops
        annotations:
          summary: "Nginx is down"
          description: "Nginx service is not responding"
          runbook_url: "https://docs.restauranthub.com/runbooks/nginx-down"

      - alert: NginxHighErrorRate
        expr: (sum(rate(nginx_http_requests_total{status=~"5.."}[5m])) / sum(rate(nginx_http_requests_total[5m]))) * 100 > 5
        for: 5m
        labels:
          severity: warning
          service: loadbalancer
          team: devops
        annotations:
          summary: "Nginx error rate is high"
          description: "Nginx error rate is {{ $value }}%"
          runbook_url: "https://docs.restauranthub.com/runbooks/nginx-high-errors"

      # Container alerts
      - alert: ContainerDown
        expr: up{job="cadvisor"} == 0
        for: 1m
        labels:
          severity: warning
          service: containers
          team: devops
        annotations:
          summary: "Container monitoring is down"
          description: "cAdvisor service is not responding"
          runbook_url: "https://docs.restauranthub.com/runbooks/cadvisor-down"

      - alert: ContainerHighCPUUsage
        expr: (sum(rate(container_cpu_usage_seconds_total[5m])) by (name) * 100) > 80
        for: 10m
        labels:
          severity: warning
          service: containers
          team: devops
        annotations:
          summary: "Container {{ $labels.name }} has high CPU usage"
          description: "Container CPU usage is {{ $value }}%"
          runbook_url: "https://docs.restauranthub.com/runbooks/container-high-cpu"

      - alert: ContainerHighMemoryUsage
        expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
          service: containers
          team: devops
        annotations:
          summary: "Container {{ $labels.name }} has high memory usage"
          description: "Container memory usage is {{ $value }}%"
          runbook_url: "https://docs.restauranthub.com/runbooks/container-high-memory"

      - alert: ContainerRestartingFrequently
        expr: increase(container_restart_count[1h]) > 3
        for: 5m
        labels:
          severity: warning
          service: containers
          team: devops
        annotations:
          summary: "Container {{ $labels.name }} is restarting frequently"
          description: "Container has restarted {{ $value }} times in the last hour"
          runbook_url: "https://docs.restauranthub.com/runbooks/container-restarts"

      # SSL Certificate alerts
      - alert: SSLCertificateExpiringSoon
        expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 7  # 7 days
        for: 1h
        labels:
          severity: warning
          service: infrastructure
          team: devops
        annotations:
          summary: "SSL certificate expiring soon"
          description: "SSL certificate for {{ $labels.instance }} expires in {{ $value | humanizeDuration }}"
          runbook_url: "https://docs.restauranthub.com/runbooks/ssl-cert-expiring"

      - alert: SSLCertificateExpired
        expr: probe_ssl_earliest_cert_expiry - time() < 0
        for: 1m
        labels:
          severity: critical
          service: infrastructure
          team: devops
        annotations:
          summary: "SSL certificate has expired"
          description: "SSL certificate for {{ $labels.instance }} has expired"
          runbook_url: "https://docs.restauranthub.com/runbooks/ssl-cert-expired"

      # Blackbox exporter alerts
      - alert: WebsiteDown
        expr: probe_success{job="blackbox-http"} == 0
        for: 2m
        labels:
          severity: critical
          service: website
          team: frontend
        annotations:
          summary: "Website is down"
          description: "{{ $labels.instance }} is not responding to HTTP requests"
          runbook_url: "https://docs.restauranthub.com/runbooks/website-down"

      - alert: WebsiteSlowResponse
        expr: probe_duration_seconds{job="blackbox-http"} > 5
        for: 5m
        labels:
          severity: warning
          service: website
          team: frontend
        annotations:
          summary: "Website response is slow"
          description: "{{ $labels.instance }} response time is {{ $value }}s"
          runbook_url: "https://docs.restauranthub.com/runbooks/website-slow"

      # Monitoring system alerts
      - alert: PrometheusConfigReloadFailed
        expr: prometheus_config_last_reload_successful == 0
        for: 5m
        labels:
          severity: warning
          service: monitoring
          team: devops
        annotations:
          summary: "Prometheus configuration reload failed"
          description: "Prometheus configuration reload has failed"
          runbook_url: "https://docs.restauranthub.com/runbooks/prometheus-config-reload"

      - alert: PrometheusTooManyRestarts
        expr: changes(process_start_time_seconds{job="prometheus"}[1h]) > 2
        for: 5m
        labels:
          severity: warning
          service: monitoring
          team: devops
        annotations:
          summary: "Prometheus is restarting frequently"
          description: "Prometheus has restarted {{ $value }} times in the last hour"
          runbook_url: "https://docs.restauranthub.com/runbooks/prometheus-restarts"