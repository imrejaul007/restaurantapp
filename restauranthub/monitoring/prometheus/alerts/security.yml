groups:
- name: security.rules
  rules:

  # ============================================================================
  # AUTHENTICATION & AUTHORIZATION ALERTS
  # ============================================================================

  # Critical Authentication Failure Rate
  - alert: CriticalAuthenticationFailureRate
    expr: sum(rate(auth_failures_total[5m])) > 50
    for: 2m
    labels:
      severity: critical
      team: security
      component: authentication
    annotations:
      summary: "CRITICAL: Very high authentication failure rate"
      description: "Authentication failure rate is above 50 failures/second ({{ $value }} failures/s). Possible brute force attack."
      runbook_url: "https://runbooks.restauranthub.com/security/critical-auth-failures"

  # High Authentication Failure Rate
  - alert: HighAuthenticationFailureRate
    expr: sum(rate(auth_failures_total[5m])) > 10
    for: 5m
    labels:
      severity: warning
      team: security
      component: authentication
    annotations:
      summary: "High authentication failure rate"
      description: "Authentication failure rate is above 10 failures/second ({{ $value }} failures/s)"
      runbook_url: "https://runbooks.restauranthub.com/security/high-auth-failures"

  # Suspicious IP Activity
  - alert: SuspiciousIPActivity
    expr: sum(rate(http_requests_total[5m])) by (source_ip) > 100
    for: 5m
    labels:
      severity: warning
      team: security
      component: intrusion-detection
    annotations:
      summary: "Suspicious activity from IP {{ $labels.source_ip }}"
      description: "IP {{ $labels.source_ip }} is making more than 100 requests/second ({{ $value }} req/s)"
      runbook_url: "https://runbooks.restauranthub.com/security/suspicious-ip"

  # Rate Limit Violations
  - alert: RateLimitViolations
    expr: sum(rate(rate_limit_violations_total[5m])) > 5
    for: 5m
    labels:
      severity: warning
      team: security
      component: rate-limiting
    annotations:
      summary: "High rate limit violations"
      description: "Rate limit violations above 5/second ({{ $value }} violations/s)"
      runbook_url: "https://runbooks.restauranthub.com/security/rate-limit-violations"

  # JWT Token Anomalies
  - alert: JWTTokenAnomalies
    expr: sum(rate(jwt_validation_failures_total[5m])) > 2
    for: 5m
    labels:
      severity: warning
      team: security
      component: authentication
    annotations:
      summary: "JWT token validation failures"
      description: "JWT token validation failures above 2/second ({{ $value }} failures/s)"
      runbook_url: "https://runbooks.restauranthub.com/security/jwt-anomalies"

  # Account Lockouts
  - alert: AccountLockouts
    expr: sum(rate(account_lockouts_total[5m])) > 1
    for: 5m
    labels:
      severity: warning
      team: security
      component: authentication
    annotations:
      summary: "Account lockouts detected"
      description: "Account lockouts above 1/second ({{ $value }} lockouts/s)"
      runbook_url: "https://runbooks.restauranthub.com/security/account-lockouts"

  # ============================================================================
  # DATA ACCESS & PRIVACY ALERTS
  # ============================================================================

  # Unusual Data Access Patterns
  - alert: UnusualDataAccessPatterns
    expr: sum(rate(database_queries_total{query_type="SELECT"}[1h])) > 2 * sum(rate(database_queries_total{query_type="SELECT"}[24h] offset 24h))
    for: 30m
    labels:
      severity: warning
      team: security
      component: data-access
    annotations:
      summary: "Unusual data access patterns detected"
      description: "Data access rate is more than 2x the rate from 24 hours ago"
      runbook_url: "https://runbooks.restauranthub.com/security/unusual-data-access"

  # Bulk Data Download
  - alert: BulkDataDownload
    expr: sum(rate(http_response_size_bytes[5m])) by (user_id) > 100*1024*1024
    for: 5m
    labels:
      severity: warning
      team: security
      component: data-protection
    annotations:
      summary: "Bulk data download detected"
      description: "User {{ $labels.user_id }} is downloading more than 100MB/second"
      runbook_url: "https://runbooks.restauranthub.com/security/bulk-download"

  # Administrative Access Anomaly
  - alert: AdministrativeAccessAnomaly
    expr: sum(rate(admin_actions_total[1h])) > 2 * sum(rate(admin_actions_total[24h] offset 24h))
    for: 30m
    labels:
      severity: warning
      team: security
      component: admin-access
    annotations:
      summary: "Unusual administrative access patterns"
      description: "Administrative actions are more than 2x the rate from 24 hours ago"
      runbook_url: "https://runbooks.restauranthub.com/security/admin-anomaly"

  # Privilege Escalation Attempts
  - alert: PrivilegeEscalationAttempts
    expr: sum(rate(privilege_escalation_attempts_total[5m])) > 0
    for: 2m
    labels:
      severity: critical
      team: security
      component: authorization
    annotations:
      summary: "CRITICAL: Privilege escalation attempts detected"
      description: "Privilege escalation attempts detected ({{ $value }} attempts/s)"
      runbook_url: "https://runbooks.restauranthub.com/security/privilege-escalation"

  # ============================================================================
  # VULNERABILITY & COMPLIANCE ALERTS
  # ============================================================================

  # High Severity Vulnerabilities
  - alert: HighSeverityVulnerabilities
    expr: vulnerability_scan_high_severity > 0
    for: 0m
    labels:
      severity: critical
      team: security
      component: vulnerability-management
    annotations:
      summary: "CRITICAL: High severity vulnerabilities detected"
      description: "{{ $value }} high severity vulnerabilities found in latest scan"
      runbook_url: "https://runbooks.restauranthub.com/security/high-severity-vulns"

  # Medium Severity Vulnerabilities
  - alert: MediumSeverityVulnerabilities
    expr: vulnerability_scan_medium_severity > 5
    for: 0m
    labels:
      severity: warning
      team: security
      component: vulnerability-management
    annotations:
      summary: "Multiple medium severity vulnerabilities detected"
      description: "{{ $value }} medium severity vulnerabilities found in latest scan"
      runbook_url: "https://runbooks.restauranthub.com/security/medium-severity-vulns"

  # Security Scan Failed
  - alert: SecurityScanFailed
    expr: time() - security_scan_last_success_timestamp > 86400
    for: 0m
    labels:
      severity: warning
      team: security
      component: vulnerability-scanning
    annotations:
      summary: "Security scan failed or overdue"
      description: "Security scan has not completed successfully for more than 24 hours"
      runbook_url: "https://runbooks.restauranthub.com/security/scan-failed"

  # Compliance Check Failed
  - alert: ComplianceCheckFailed
    expr: compliance_check_failed > 0
    for: 0m
    labels:
      severity: warning
      team: security
      component: compliance
    annotations:
      summary: "Compliance check failed"
      description: "{{ $value }} compliance checks have failed"
      runbook_url: "https://runbooks.restauranthub.com/security/compliance-failed"

  # ============================================================================
  # NETWORK SECURITY ALERTS
  # ============================================================================

  # DDoS Attack Detected
  - alert: DDoSAttackDetected
    expr: sum(rate(http_requests_total[1m])) > 10000
    for: 2m
    labels:
      severity: critical
      team: security
      component: ddos-protection
    annotations:
      summary: "CRITICAL: Possible DDoS attack detected"
      description: "Request rate is above 10,000 requests/second ({{ $value }} req/s)"
      runbook_url: "https://runbooks.restauranthub.com/security/ddos-attack"

  # Geo-Location Anomaly
  - alert: GeoLocationAnomaly
    expr: sum(rate(requests_from_suspicious_countries_total[5m])) > 5
    for: 5m
    labels:
      severity: warning
      team: security
      component: geo-blocking
    annotations:
      summary: "Unusual geographic access patterns"
      description: "Requests from suspicious countries above 5/second ({{ $value }} req/s)"
      runbook_url: "https://runbooks.restauranthub.com/security/geo-anomaly"

  # Malicious User Agent
  - alert: MaliciousUserAgent
    expr: sum(rate(requests_malicious_user_agent_total[5m])) > 1
    for: 5m
    labels:
      severity: warning
      team: security
      component: intrusion-detection
    annotations:
      summary: "Malicious user agents detected"
      description: "Requests from malicious user agents above 1/second ({{ $value }} req/s)"
      runbook_url: "https://runbooks.restauranthub.com/security/malicious-user-agent"

  # ============================================================================
  # API SECURITY ALERTS
  # ============================================================================

  # API Abuse Detection
  - alert: APIAbuseDetection
    expr: sum(rate(api_requests_total[5m])) by (api_key, endpoint) > 100
    for: 5m
    labels:
      severity: warning
      team: security
      component: api-security
    annotations:
      summary: "Potential API abuse detected"
      description: "API key {{ $labels.api_key }} is making more than 100 requests/second to {{ $labels.endpoint }}"
      runbook_url: "https://runbooks.restauranthub.com/security/api-abuse"

  # Unauthorized API Access
  - alert: UnauthorizedAPIAccess
    expr: sum(rate(http_requests_total{status="401"}[5m])) > 10
    for: 5m
    labels:
      severity: warning
      team: security
      component: api-security
    annotations:
      summary: "High unauthorized API access attempts"
      description: "Unauthorized API access attempts above 10/second ({{ $value }} attempts/s)"
      runbook_url: "https://runbooks.restauranthub.com/security/unauthorized-api-access"

  # SQL Injection Attempts
  - alert: SQLInjectionAttempts
    expr: sum(rate(sql_injection_attempts_total[5m])) > 0
    for: 2m
    labels:
      severity: critical
      team: security
      component: application-security
    annotations:
      summary: "CRITICAL: SQL injection attempts detected"
      description: "SQL injection attempts detected ({{ $value }} attempts/s)"
      runbook_url: "https://runbooks.restauranthub.com/security/sql-injection"

  # XSS Attempts
  - alert: XSSAttempts
    expr: sum(rate(xss_attempts_total[5m])) > 0
    for: 2m
    labels:
      severity: critical
      team: security
      component: application-security
    annotations:
      summary: "CRITICAL: XSS attempts detected"
      description: "Cross-site scripting attempts detected ({{ $value }} attempts/s)"
      runbook_url: "https://runbooks.restauranthub.com/security/xss-attempts"

  # ============================================================================
  # SECURITY CONFIGURATION ALERTS
  # ============================================================================

  # Insecure Configuration Detected
  - alert: InsecureConfigurationDetected
    expr: insecure_config_count > 0
    for: 0m
    labels:
      severity: warning
      team: security
      component: configuration
    annotations:
      summary: "Insecure configuration detected"
      description: "{{ $value }} insecure configurations found"
      runbook_url: "https://runbooks.restauranthub.com/security/insecure-config"

  # Security Policy Violation
  - alert: SecurityPolicyViolation
    expr: sum(rate(security_policy_violations_total[5m])) > 0
    for: 2m
    labels:
      severity: warning
      team: security
      component: policy-enforcement
    annotations:
      summary: "Security policy violations detected"
      description: "Security policy violations detected ({{ $value }} violations/s)"
      runbook_url: "https://runbooks.restauranthub.com/security/policy-violation"