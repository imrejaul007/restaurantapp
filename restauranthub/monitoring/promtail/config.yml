server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Application logs
  - job_name: restauranthub-api
    static_configs:
      - targets:
          - localhost
        labels:
          job: restauranthub-api
          service: api
          environment: production
          __path__: /var/log/restauranthub/api/*.log

    pipeline_stages:
      # Parse structured JSON logs
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            service: service
            trace_id: trace_id
            span_id: span_id
            user_id: user_id
            request_id: request_id
            method: method
            url: url
            status_code: status_code
            duration: duration
            error: error

      # Parse timestamp
      - timestamp:
          source: timestamp
          format: RFC3339Nano

      # Extract labels
      - labels:
          level:
          service:
          trace_id:
          method:
          status_code:

      # Filter out debug logs in production
      - match:
          selector: '{level="debug"}'
          action: drop

      # Add correlation ID for tracing
      - template:
          source: correlation_id
          template: '{{ .trace_id }}-{{ .span_id }}'

  # Web application logs
  - job_name: restauranthub-web
    static_configs:
      - targets:
          - localhost
        labels:
          job: restauranthub-web
          service: web
          environment: production
          __path__: /var/log/restauranthub/web/*.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            page: page
            user_agent: user_agent
            ip: ip
            session_id: session_id

      - timestamp:
          source: timestamp
          format: RFC3339Nano

      - labels:
          level:
          page:

  # Nginx access logs
  - job_name: nginx-access
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx-access
          service: nginx
          log_type: access
          __path__: /var/log/nginx/access.log

    pipeline_stages:
      # Parse Nginx access log format
      - regex:
          expression: '^(?P<remote_addr>\S+) - (?P<remote_user>\S+) \[(?P<time_local>[^\]]+)\] "(?P<method>\S+) (?P<request_uri>\S+) (?P<protocol>\S+)" (?P<status>\d+) (?P<body_bytes_sent>\d+) "(?P<http_referer>[^"]*)" "(?P<http_user_agent>[^"]*)" (?P<request_time>\d+\.\d+)'

      - timestamp:
          source: time_local
          format: '02/Jan/2006:15:04:05 -0700'

      - labels:
          method:
          status:
          remote_addr:

      # Filter out health check requests
      - match:
          selector: '{request_uri=~"/health.*"}'
          action: drop

  # Nginx error logs
  - job_name: nginx-error
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx-error
          service: nginx
          log_type: error
          __path__: /var/log/nginx/error.log

    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) \[(?P<level>\w+)\] (?P<pid>\d+)#(?P<tid>\d+): (?P<message>.*)'

      - timestamp:
          source: timestamp
          format: '2006/01/02 15:04:05'

      - labels:
          level:
          pid:

  # PostgreSQL logs
  - job_name: postgresql
    static_configs:
      - targets:
          - localhost
        labels:
          job: postgresql
          service: database
          __path__: /var/log/postgresql/*.log

    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3} \w{3}) \[(?P<pid>\d+)\] (?P<level>\w+): (?P<message>.*)'

      - timestamp:
          source: timestamp
          format: '2006-01-02 15:04:05.000 MST'

      - labels:
          level:
          pid:

      # Filter out connection logs
      - match:
          selector: '{message=~"connection.*"}'
          action: drop

  # Redis logs
  - job_name: redis
    static_configs:
      - targets:
          - localhost
        labels:
          job: redis
          service: cache
          __path__: /var/log/redis/*.log

    pipeline_stages:
      - regex:
          expression: '^(?P<pid>\d+):(?P<role>\w+) (?P<timestamp>\d{2} \w{3} \d{4} \d{2}:\d{2}:\d{2}\.\d{3}) (?P<level>[*#-]) (?P<message>.*)'

      - timestamp:
          source: timestamp
          format: '02 Jan 2006 15:04:05.000'

      - labels:
          level:
          role:
          pid:

  # Docker container logs
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/restauranthub-(.*)'
        target_label: container
        replacement: '${1}'

      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service

    pipeline_stages:
      - docker: {}

      - json:
          expressions:
            timestamp: time
            message: log
            stream: stream

      - timestamp:
          source: timestamp
          format: RFC3339Nano

      - labels:
          stream:

  # System logs
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          service: system
          __path__: /var/log/syslog

    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\w{3} \d{1,2} \d{2}:\d{2}:\d{2}) (?P<hostname>\S+) (?P<program>[^:\[]+)(?:\[(?P<pid>\d+)\])?: (?P<message>.*)'

      - timestamp:
          source: timestamp
          format: 'Jan 2 15:04:05'

      - labels:
          hostname:
          program:
          pid:

  # Custom application metrics logs
  - job_name: application-metrics
    static_configs:
      - targets:
          - localhost
        labels:
          job: application-metrics
          service: metrics
          __path__: /var/log/restauranthub/metrics/*.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            metric_name: metric_name
            metric_value: metric_value
            labels: labels
            type: type

      - timestamp:
          source: timestamp
          format: RFC3339Nano

      - labels:
          metric_name:
          type:

  # Security logs
  - job_name: security-events
    static_configs:
      - targets:
          - localhost
        labels:
          job: security-events
          service: security
          __path__: /var/log/restauranthub/security/*.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            event_type: event_type
            severity: severity
            source_ip: source_ip
            user_id: user_id
            action: action
            resource: resource
            result: result
            details: details
            trace_id: trace_id

      - timestamp:
          source: timestamp
          format: RFC3339Nano

      - labels:
          event_type:
          severity:
          source_ip:
          action:
          result:

      # Drop low-severity routine events to reduce noise
      - match:
          selector: '{severity="info", event_type="login_success"}'
          action: drop

  # Audit logs
  - job_name: audit-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: audit-logs
          service: audit
          __path__: /var/log/restauranthub/audit/*.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            user_id: user_id
            action: action
            resource: resource
            resource_id: resource_id
            ip_address: ip_address
            user_agent: user_agent
            result: result
            changes: changes

      - timestamp:
          source: timestamp
          format: RFC3339Nano

      - labels:
          action:
          resource:
          result:
          user_id:

  # Performance logs
  - job_name: performance-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: performance-logs
          service: performance
          __path__: /var/log/restauranthub/performance/*.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            endpoint: endpoint
            method: method
            duration: duration
            status_code: status_code
            db_queries: db_queries
            cache_hits: cache_hits
            memory_usage: memory_usage
            cpu_usage: cpu_usage

      - timestamp:
          source: timestamp
          format: RFC3339Nano

      - labels:
          endpoint:
          method:
          status_code:

      # Filter out fast requests to focus on performance issues
      - match:
          selector: '{duration < "100ms"}'
          action: drop

  # Error tracking logs
  - job_name: error-tracking
    static_configs:
      - targets:
          - localhost
        labels:
          job: error-tracking
          service: errors
          __path__: /var/log/restauranthub/errors/*.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            error_type: error_type
            error_message: error_message
            stack_trace: stack_trace
            request_id: request_id
            user_id: user_id
            endpoint: endpoint
            severity: severity

      - timestamp:
          source: timestamp
          format: RFC3339Nano

      - labels:
          error_type:
          severity:
          endpoint:

  # Business metrics logs
  - job_name: business-metrics
    static_configs:
      - targets:
          - localhost
        labels:
          job: business-metrics
          service: business
          __path__: /var/log/restauranthub/business/*.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            event: event
            user_id: user_id
            restaurant_id: restaurant_id
            job_id: job_id
            order_id: order_id
            amount: amount
            category: category

      - timestamp:
          source: timestamp
          format: RFC3339Nano

      - labels:
          event:
          category:

  # Microservices logs
  - job_name: auth-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: auth-service
          service: auth
          __path__: /var/log/restauranthub/auth-service/*.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            user_id: user_id
            session_id: session_id
            action: action

      - timestamp:
          source: timestamp
          format: RFC3339Nano

      - labels:
          level:
          action:

  - job_name: notification-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: notification-service
          service: notification
          __path__: /var/log/restauranthub/notification-service/*.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            notification_type: notification_type
            recipient: recipient
            status: status

      - timestamp:
          source: timestamp
          format: RFC3339Nano

      - labels:
          level:
          notification_type:
          status:

  # Kubernetes logs (if using k8s)
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod

    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_controller_name]
        regex: ([0-9a-z-.]+?)(-[0-9a-f]{8,10})?
        action: replace
        target_label: __tmp_controller_name

      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name, __meta_kubernetes_pod_label_app, __tmp_controller_name, __meta_kubernetes_pod_name]
        regex: ^;*([^;]+)(;.*)?$
        action: replace
        target_label: app

      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component, __meta_kubernetes_pod_label_component]
        regex: ^;*([^;]+)(;.*)?$
        action: replace
        target_label: component

      - action: replace
        source_labels: [__meta_kubernetes_pod_node_name]
        target_label: node_name

      - action: replace
        source_labels: [__meta_kubernetes_namespace]
        target_label: namespace

      - action: replace
        source_labels: [__meta_kubernetes_pod_name]
        target_label: pod

      - action: replace
        source_labels: [__meta_kubernetes_pod_container_name]
        target_label: container

      - replacement: /var/log/pods/*$1/*.log
        separator: /
        source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
        target_label: __path__

    pipeline_stages:
      - cri: {}

      - json:
          expressions:
            level: level
            msg: msg
            component: component

      - labels:
          level:
          component: