server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # RestaurantHub API application logs
  - job_name: restauranthub-api
    static_configs:
      - targets:
          - localhost
        labels:
          job: restauranthub-api
          service: api
          environment: "${ENVIRONMENT:-development}"
          __path__: /var/log/restauranthub/api/*.log

    pipeline_stages:
      # Parse JSON logs
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            context: context
            trace_id: trace_id
            span_id: span_id
            user_id: user_id
            request_id: request_id
            method: method
            path: path
            status_code: status_code
            duration: duration
            error: error

      # Parse timestamp
      - timestamp:
          source: timestamp
          format: RFC3339

      # Add labels based on log content
      - labels:
          level:
          service:
          method:
          status_code:
          user_id:
          trace_id:

      # Drop debug logs in production
      - drop:
          expression: '.*level="debug".*'
          drop_counter_reason: debug_logs_dropped

      # Extract metrics from logs
      - metrics:
          request_duration:
            type: Histogram
            description: "Request duration in milliseconds"
            source: duration
            config:
              buckets: [0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5, 5, 10]

      - metrics:
          requests_total:
            type: Counter
            description: "Total HTTP requests"
            config:
              action: inc

      - metrics:
          error_requests_total:
            type: Counter
            description: "Total HTTP error requests"
            config:
              action: inc
            match_stage:
              - labels:
                  level: error

  # RestaurantHub Web application logs
  - job_name: restauranthub-web
    static_configs:
      - targets:
          - localhost
        labels:
          job: restauranthub-web
          service: web
          environment: "${ENVIRONMENT:-development}"
          __path__: /var/log/restauranthub/web/*.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            page: page
            user_id: user_id
            session_id: session_id
            error: error

      - timestamp:
          source: timestamp
          format: RFC3339

      - labels:
          level:
          service:
          page:
          user_id:

  # PostgreSQL logs
  - job_name: postgresql
    static_configs:
      - targets:
          - localhost
        labels:
          job: postgresql
          service: database
          environment: "${ENVIRONMENT:-development}"
          __path__: /var/log/postgresql/*.log

    pipeline_stages:
      # Parse PostgreSQL log format
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3} \w+) \[(?P<pid>\d+)\] (?P<level>\w+):\s+(?P<message>.*?)(?:\s+STATEMENT:\s+(?P<statement>.*))?$'

      - timestamp:
          source: timestamp
          format: '2006-01-02 15:04:05.000 MST'

      - labels:
          level:
          service:
          pid:

      # Extract slow query metrics
      - metrics:
          slow_queries_total:
            type: Counter
            description: "Total slow database queries"
            config:
              action: inc
            match_stage:
              - regex:
                  expression: '.*duration: (\d+\.\d+) ms.*'
                  source: message
              - template:
                  source: duration_ms
                  template: '{{ .Value }}'
              - match:
                  selector: '{job="postgresql"}'
                  expression: '{{ if gt (index . "duration_ms" | float64) 1000 }}true{{ end }}'

  # Redis logs
  - job_name: redis
    static_configs:
      - targets:
          - localhost
        labels:
          job: redis
          service: cache
          environment: "${ENVIRONMENT:-development}"
          __path__: /var/log/redis/*.log

    pipeline_stages:
      - regex:
          expression: '^(?P<pid>\d+):(?P<role>\w+) (?P<timestamp>\d{2} \w{3} \d{4} \d{2}:\d{2}:\d{2}\.\d{3}) (?P<level>\w+) (?P<message>.*)$'

      - timestamp:
          source: timestamp
          format: '02 Jan 2006 15:04:05.000'

      - labels:
          level:
          service:
          role:
          pid:

  # Nginx access logs
  - job_name: nginx-access
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx-access
          service: nginx
          log_type: access
          environment: "${ENVIRONMENT:-development}"
          __path__: /var/log/nginx/access.log

    pipeline_stages:
      # Parse Nginx access log format
      - regex:
          expression: '^(?P<remote_addr>\S+) - (?P<remote_user>\S+) \[(?P<time_local>[^\]]+)\] "(?P<method>\S+) (?P<path>\S+) (?P<protocol>\S+)" (?P<status>\d+) (?P<body_bytes_sent>\d+) "(?P<http_referer>[^"]*)" "(?P<http_user_agent>[^"]*)" (?P<request_time>\d+\.\d+)'

      - timestamp:
          source: time_local
          format: '02/Jan/2006:15:04:05 -0700'

      - labels:
          method:
          status:
          service:

      # Extract access metrics
      - metrics:
          nginx_requests_total:
            type: Counter
            description: "Total nginx requests"
            config:
              action: inc

      - metrics:
          nginx_request_duration:
            type: Histogram
            description: "Nginx request duration"
            source: request_time
            config:
              buckets: [0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5, 5, 10]

  # Nginx error logs
  - job_name: nginx-error
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx-error
          service: nginx
          log_type: error
          environment: "${ENVIRONMENT:-development}"
          __path__: /var/log/nginx/error.log

    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) \[(?P<level>\w+)\] (?P<pid>\d+)#(?P<tid>\d+): (?P<message>.*?)(?:, client: (?P<client>\S+))?(?:, server: (?P<server>\S+))?(?:, request: "(?P<request>[^"]*)")?(?:, host: "(?P<host>[^"]*)")?'

      - timestamp:
          source: timestamp
          format: '2006/01/02 15:04:05'

      - labels:
          level:
          service:
          client:

  # Docker container logs
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      # Only scrape containers with specific labels
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        regex: '(restauranthub-api|restauranthub-web|restauranthub-postgres|restauranthub-redis|restauranthub-nginx)'
        action: keep

      # Set job name from service label
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: job

      # Set service name
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service

      # Set container name
      - source_labels: [__meta_docker_container_name]
        target_label: container

      # Set environment
      - replacement: "${ENVIRONMENT:-development}"
        target_label: environment

    pipeline_stages:
      # Try to parse as JSON first (for structured logs)
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            service: service
            trace_id: trace_id
            span_id: span_id
          source: message

      # If JSON parsing fails, treat as plain text
      - template:
          source: message
          template: '{{ if not .timestamp }}{{ .Entry }}{{ else }}{{ .message }}{{ end }}'

      # Set timestamp if available
      - timestamp:
          source: timestamp
          format: RFC3339
          fallback_formats:
            - '2006-01-02T15:04:05.000Z'
            - '2006-01-02 15:04:05'

      # Add labels
      - labels:
          level:
          service:
          container:
          trace_id:

  # Kubernetes logs (if running in k8s)
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod

    relabel_configs:
      # Only scrape pods with restauranthub labels
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: 'restauranthub.*'
        action: keep

      # Set job name
      - source_labels: [__meta_kubernetes_pod_label_app]
        target_label: job

      # Set service name
      - source_labels: [__meta_kubernetes_pod_label_component]
        target_label: service

      # Set namespace
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace

      # Set pod name
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod

    pipeline_stages:
      # Parse Kubernetes log format
      - regex:
          expression: '^(?P<timestamp>\S+) (?P<stream>\w+) (?P<flags>\w+) (?P<message>.*)$'

      - timestamp:
          source: timestamp
          format: RFC3339Nano

      # Try to parse message as JSON
      - json:
          expressions:
            level: level
            logger: logger
            msg: msg
            trace_id: trace_id
          source: message

      - labels:
          stream:
          level:
          service:
          namespace:
          pod:

  # System logs
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          service: system
          environment: "${ENVIRONMENT:-development}"
          __path__: /var/log/syslog

    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\w{3}\s+\d{1,2} \d{2}:\d{2}:\d{2}) (?P<hostname>\S+) (?P<program>\S+?)(?:\[(?P<pid>\d+)\])?: (?P<message>.*)$'

      - timestamp:
          source: timestamp
          format: 'Jan 2 15:04:05'
          year: 2024

      - labels:
          service:
          program:
          hostname:

# Global configuration
global:
  # Scrape interval
  scrape_interval: 1s

  # Batch settings
  batch_wait: 1s
  batch_size: 1048576  # 1MB

  # External labels
  external_labels:
    cluster: restauranthub
    environment: "${ENVIRONMENT:-development}"
    region: "${AWS_REGION:-us-east-1}"