# Performance Monitoring and Alerting Configuration
# For RestaurantHub Scalability Assessment

version: '3.8'

services:
  # Performance Monitoring Stack
  prometheus-performance:
    image: prom/prometheus:latest
    container_name: prometheus-performance
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus-performance.yml:/etc/prometheus/prometheus.yml
      - prometheus-perf-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.retention.size=10GB'
    networks:
      - monitoring-network

  # Grafana for Performance Dashboards
  grafana-performance:
    image: grafana/grafana:latest
    container_name: grafana-performance
    restart: unless-stopped
    ports:
      - "3004:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=PerformanceMonitoring123
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource,grafana-piechart-panel
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/performance-overview.json
    volumes:
      - grafana-perf-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - monitoring-network
    depends_on:
      - prometheus-performance

  # InfluxDB for Time Series Data
  influxdb-performance:
    image: influxdb:2.7-alpine
    container_name: influxdb-performance
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=PerformanceData123
      - DOCKER_INFLUXDB_INIT_ORG=RestaurantHub
      - DOCKER_INFLUXDB_INIT_BUCKET=performance-metrics
      - DOCKER_INFLUXDB_INIT_RETENTION=168h
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=performance-monitoring-token-super-secret
    volumes:
      - influxdb-perf-data:/var/lib/influxdb2
      - influxdb-perf-config:/etc/influxdb2
    networks:
      - monitoring-network

  # Telegraf for System Metrics Collection
  telegraf-performance:
    image: telegraf:1.28-alpine
    container_name: telegraf-performance
    restart: unless-stopped
    environment:
      - INFLUX_URL=http://influxdb-performance:8086
      - INFLUX_TOKEN=performance-monitoring-token-super-secret
      - INFLUX_ORG=RestaurantHub
      - INFLUX_BUCKET=performance-metrics
    volumes:
      - ./telegraf/telegraf-performance.conf:/etc/telegraf/telegraf.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/rootfs/sys:ro
      - /proc:/rootfs/proc:ro
      - /etc:/rootfs/etc:ro
    networks:
      - monitoring-network
    depends_on:
      - influxdb-performance

  # AlertManager for Performance Alerts
  alertmanager-performance:
    image: prom/alertmanager:latest
    container_name: alertmanager-performance
    restart: unless-stopped
    ports:
      - "9094:9093"
    volumes:
      - ./alertmanager/alertmanager-performance.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-perf-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9094'
      - '--cluster.advertise-address=0.0.0.0:9094'
    networks:
      - monitoring-network

  # Node Exporter for System Metrics
  node-exporter-performance:
    image: prom/node-exporter:latest
    container_name: node-exporter-performance
    restart: unless-stopped
    ports:
      - "9101:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring-network

  # cAdvisor for Container Metrics
  cadvisor-performance:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor-performance
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - monitoring-network

  # Jaeger for Distributed Tracing
  jaeger-performance:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger-performance
    restart: unless-stopped
    ports:
      - "16687:16686"
      - "14269:14268"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=memory
      - MEMORY_MAX_TRACES=100000
    networks:
      - monitoring-network

  # Elasticsearch for Log Analysis
  elasticsearch-performance:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    container_name: elasticsearch-performance
    restart: unless-stopped
    ports:
      - "9201:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - bootstrap.memory_lock=true
    volumes:
      - elasticsearch-perf-data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    networks:
      - monitoring-network

  # Kibana for Log Visualization
  kibana-performance:
    image: docker.elastic.co/kibana/kibana:8.8.0
    container_name: kibana-performance
    restart: unless-stopped
    ports:
      - "5602:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch-performance:9200
      - xpack.security.enabled=false
    networks:
      - monitoring-network
    depends_on:
      - elasticsearch-performance

  # Redis for Performance Cache Testing
  redis-performance:
    image: redis:7-alpine
    container_name: redis-performance
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis-perf-data:/data
    networks:
      - monitoring-network

  # Load Testing Controller
  k6-controller:
    image: loadimpact/k6:latest
    container_name: k6-controller
    restart: "no"
    volumes:
      - ../tests/performance:/scripts
      - ./results:/results
    environment:
      - K6_PROMETHEUS_RW_SERVER_URL=http://prometheus-performance:9090/api/v1/write
      - K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM=true
      - BASE_URL=http://host.docker.internal:3000
      - ADMIN_EMAIL=admin@restauranthub.com
      - ADMIN_PASSWORD=Password123
    networks:
      - monitoring-network
    depends_on:
      - prometheus-performance
      - influxdb-performance
    profiles:
      - load-test

  # Performance Test Results API
  results-api:
    build:
      context: ./results-api
      dockerfile: Dockerfile
    container_name: performance-results-api
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres-results:5432/performance_results
      - INFLUXDB_URL=http://influxdb-performance:8086
      - INFLUXDB_TOKEN=performance-monitoring-token-super-secret
    volumes:
      - ./results:/app/results
    networks:
      - monitoring-network
    depends_on:
      - postgres-results
      - influxdb-performance

  # PostgreSQL for Results Storage
  postgres-results:
    image: postgres:15-alpine
    container_name: postgres-results
    restart: unless-stopped
    environment:
      - POSTGRES_DB=performance_results
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres-results-data:/var/lib/postgresql/data
      - ./sql/init-results-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - monitoring-network

networks:
  monitoring-network:
    driver: bridge
    name: performance-monitoring
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  prometheus-perf-data:
    driver: local
  grafana-perf-data:
    driver: local
  influxdb-perf-data:
    driver: local
  influxdb-perf-config:
    driver: local
  alertmanager-perf-data:
    driver: local
  elasticsearch-perf-data:
    driver: local
  redis-perf-data:
    driver: local
  postgres-results-data:
    driver: local