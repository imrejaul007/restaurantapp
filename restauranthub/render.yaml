services:
  # Frontend - Next.js Web Application
  - type: web
    name: restauranthub-web
    env: node
    buildCommand: npm install && npm run build --workspace=apps/web
    startCommand: npm run start --workspace=apps/web
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: restauranthub-api
          property: host
          envVarKey: API_URL
      - key: NEXT_PUBLIC_SITE_URL
        fromService:
          type: web
          name: restauranthub-web
          property: host
    buildFilter:
      paths:
        - apps/web/**
        - packages/**
        - package.json
        - package-lock.json
    rootDir: .

  # Backend API - NestJS Application
  - type: web
    name: restauranthub-api
    env: node
    buildCommand: npm install && npm run build --workspace=apps/api
    startCommand: npm run start:prod --workspace=apps/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: restauranthub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: BCRYPT_SALT_ROUNDS
        value: 12
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: restauranthub-web
          property: host
      - key: REDIS_URL
        fromService:
          type: redis
          name: restauranthub-redis
          property: connectionString
    buildFilter:
      paths:
        - apps/api/**
        - packages/**
        - package.json
        - package-lock.json
    rootDir: .

  # Redis Cache
  - type: redis
    name: restauranthub-redis
    ipAllowList: []

# PostgreSQL Database
databases:
  - name: restauranthub-db
    databaseName: restauranthub
    user: restauranthub
    plan: starter